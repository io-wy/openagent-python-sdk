[project]
name = "io-openagent-sdk"
version = "0.3.0"
description = "Config-as-code agent SDK"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx[http2]>=0.28.1",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "coverage[toml]>=7.6.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
mcp = [
    "mcp>=1.0.0",
]
mem0 = [
    "mem0ai>=1.0.5",
]
openai = [
    "httpx>=0.27.0",
    "openai>=1.0.0",
]
tokenizers = [
    "tiktoken>=0.7.0",
]
yaml = [
    "pyyaml>=6.0",
]
all = [
    "io-openagent-sdk[mcp,mem0,openai,dev,tokenizers,yaml]",
]

[project.scripts]
openagents = "openagents.cli.main:main"

[build-system]
requires = ["setuptools>=68.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["openagents*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
source = ["openagents"]

[tool.coverage.report]
fail_under = 92
show_missing = true
skip_covered = true
omit = [
    "openagents/plugins/builtin/memory/mem0_memory.py",
    "openagents/plugins/builtin/tool/mcp_tool.py",
]

[dependency-groups]
dev = [
    "aiohttp>=3.13.5",
    "pytest-timeout>=2.4.0",
]
